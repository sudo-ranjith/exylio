services:
  # ── PostgreSQL + TimescaleDB ─────────────────────────────────────
  db:
    image: timescale/timescaledb:latest-pg15
    container_name: exylio_db
    restart: unless-stopped
    environment:
      POSTGRES_DB: exylio
      POSTGRES_USER: exylio_user
      POSTGRES_PASSWORD: ${DB_PASSWORD:-exylio_secret}
    volumes:
      - exylio_db_data:/var/lib/postgresql/data
      - ./docker/init_db.sql:/docker-entrypoint-initdb.d/init_db.sql
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U exylio_user -d exylio"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Redis ────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: exylio_redis
    restart: unless-stopped
    command: redis-server --appendonly yes --requirepass ${REDIS_PASSWORD:-exylio_redis}
    volumes:
      - exylio_redis_data:/data
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "--no-auth-warning", "-a", "${REDIS_PASSWORD:-exylio_redis}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── FastAPI Backend ──────────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: exylio_backend
    restart: unless-stopped
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql+asyncpg://exylio_user:${DB_PASSWORD:-exylio_secret}@db:5432/exylio
      REDIS_URL: redis://:${REDIS_PASSWORD:-exylio_redis}@redis:6379/0
    volumes:
      - ./backend:/app
      - exylio_logs:/app/logs
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

  # ── Celery Worker ────────────────────────────────────────────────
  celery_worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: exylio_celery
    restart: unless-stopped
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql+asyncpg://exylio_user:${DB_PASSWORD:-exylio_secret}@db:5432/exylio
      REDIS_URL: redis://:${REDIS_PASSWORD:-exylio_redis}@redis:6379/0
    volumes:
      - ./backend:/app
      - exylio_logs:/app/logs
    depends_on:
      - backend
    command: celery -A app.core.celery_app worker --loglevel=info --concurrency=4

  # ── Celery Beat Scheduler ────────────────────────────────────────
  celery_beat:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: exylio_beat
    restart: unless-stopped
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql+asyncpg://exylio_user:${DB_PASSWORD:-exylio_secret}@db:5432/exylio
      REDIS_URL: redis://:${REDIS_PASSWORD:-exylio_redis}@redis:6379/0
    volumes:
      - ./backend:/app
      - exylio_logs:/app/logs
    depends_on:
      - celery_worker
    command: celery -A app.core.celery_app beat --loglevel=info

  # ── React Frontend ───────────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: exylio_frontend
    restart: unless-stopped
    environment:
      REACT_APP_API_URL: http://localhost:8000
      REACT_APP_WS_URL: ws://localhost:8000
    ports:
      - "3000:3000"
    volumes:
      - ./frontend/src:/app/src
    depends_on:
      - backend

  # ── Nginx Reverse Proxy ──────────────────────────────────────────
  nginx:
    image: nginx:alpine
    container_name: exylio_nginx
    restart: unless-stopped
    volumes:
      - ./docker/nginx.conf:/etc/nginx/nginx.conf:ro
    ports:
      - "80:80"
    depends_on:
      - backend
      - frontend

volumes:
  exylio_db_data:
  exylio_redis_data:
  exylio_logs:
